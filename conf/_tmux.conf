# mouse
set-window-option -g mode-mouse on
set-option -g mouse-select-pane on
set-option -g mouse-resize-pane on
set-option -g mouse-select-window on
set-option -g mouse-utf8 on

# replace default CTRL-B
#unbind C-\ 
#set -g prefix C-b 

# last window
bind-key C-b last-window
bind-key b last-pane

# set terminal options
set -g default-terminal "screen-256color"
set -g history-limit 10000
setw -g xterm-keys on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
#set -g terminal-overrides "xterm*:XT:smcup@:rmcup@:kUP5=\eOA:kDN5=\eOB:kLFT5=\eOD:kRIT5=\eOC"

# start window counting by 1
set-option -g base-index 1
setw -g pane-base-index 0

# utf-8
set-option -g status-utf8 on

# fix pauses in vim
set-option -sg escape-time 1

# window notifications
setw -g monitor-activity on
set -g visual-activity on

# auto-reload config file
bind C-r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# statusbar ------------------------------
set-option -g status-fg white
set-option -g status-bg black
set-option -g status-attr default

# default statusbar colors
set-option -g status-fg white
set-option -g status-bg black
set-option -g status-attr default
  
# default window title colors
set-window-option -g window-status-fg cyan
set-window-option -g window-status-bg default
set-window-option -g window-status-attr dim
   
# active window title colors
set-window-option -g window-status-current-fg colour40
set-window-option -g window-status-current-bg black
set-window-option -g window-status-current-attr default

set-window-option -g window-status-activity-attr underscore
    
# command/message line colors
set-option -g message-fg white
set-option -g message-bg black
set-option -g message-attr bright
     
# Refresh the status bar every 30 seconds.
set-option -g status-interval 1

# The status bar
set status-left-length 40
set status-right-length 60
set -g status-right "#[fg=brightmagenta]#{pane_current_command} #[fg=white]| #[fg=green]#h #[fg=white]| #[fg=cyan]%d %b %R "
set-option -g display-time 1000
