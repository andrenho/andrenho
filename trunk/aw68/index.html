<!doctype html>
<html>
   <head>
      <meta charset="utf-8">
      <title>aw68k</title>
      <style type="text/css">
         @font-face {
            font-family: 'video';
            src: url(ProggyTiny.ttf);
         }
         table,tr,td {
            font-family: 'video';
            border-collapse: collapse;
            border: 1pt solid black;
            padding: 2pt;
         }
         .registers {
            font-family: 'video';
         }
         .register {
            width: 20px;
            text-align: center;
         }
         .flag {
            width: 12px;
            text-align: center;
         }
         .video { 
            position: absolute;
            top: 20px;
            left: 20px;
            width: 480px;
            height: 275px;
            border: 1pt solid black;
         }
         .cpu {
            position: absolute;
            top: 20px;
            left: 530px;
         }
         .character {
            font-family: 'video'; 
            position: absolute;
            width: 6px;
            height: 11px;
         }
         .devices {
            position: absolute;
            top: 330px;
            left: 20px;
            width: 480px;
            height: 200px;
            padding: 10px;
            border: 1pt solid black;
         }
      </style>
   </head>
   <body>
      <script src="jquery.js"></script>
      <script src="aw68k.js"></script>
      <script src="debugger.js"></script>
      <script>
         $(document).ready(function(){
            $('a.device_option').click(function(){
            })

            var machine = new Machine();
            var debug = new Debug(machine);
            debug.init();
         })
      </script>

      <div name="machine">
         <div name="video" class="video"></div>
         <div name="cpu" class="cpu">
            <div name="debugger"></div>
            <div name="register_table">
               <table name="registers">
                  <tr class="register_names"></tr>
                  <tr class="register_hex"></tr>
                  <tr class="register_dec"></tr>
               </table>
               <table name="flags">
                  <tr class="flag_names"></tr>
                  <tr class="flag_value"></tr>
               </table>
            </div>
         </div>
         <div name="devices" class="devices">
            <div name="device_options">
               <a class="device_option" name="rom_loader_opt">BIOS</a>
            </div>
            <div name="rom_loader">
               <input type="file" name="rom_name">
               <input type="button" value="Load ROM">
               <p class="message"></p>
            </div>
         </div>
      </div>
   </body>
</html>
