<!doctype html>
<html>
   <head>
      <meta charset="utf-8">
      <title>aw68k</title>
      <style type="text/css">
         @font-face {
            font-family: 'video';
            src: url(ProggyTiny.ttf);
         }
         table,tr,td {
            font-family: 'video';
            border-collapse: collapse;
            /* border: 1pt solid black; */
            padding: 2pt;
         }
         .video { 
            position: absolute;
            top: 20px;
            left: 20px;
            width: 480px;
            height: 275px;
            border: 1pt solid black;
         }
         .cpu {
            position: absolute;
            top: 20px;
            left: 530px;
         }
         .character {
            font-family: 'video'; 
            position: absolute;
            width: 6px;
            height: 11px;
         }
         .devices {
            position: absolute;
            top: 330px;
            left: 20px;
            width: 480px;
            height: 200px;
            padding: 10px;
            /* border: 1pt solid black; */
         }
         .cpu {
            width: 320px;
         }
         .debugger { 
            position: absolute;
            width: 250px;
            left: 0; 
            height: 500px;
            overflow: auto;
         }
         .registers { 
            position: absolute; 
            width: 50px;
            right: 0;
         }
         .pc {
            background-color: #f0f080;
         }
      </style>
   </head>
   <body>

      <div id="machine">
         <div id="video" class="video"></div>
         <div id="cpu" class="cpu">
            <input type="button" value="Step" id="step">
            <div id="debugger" class="debugger">
               <table id="instruction_table"></table>
            </div>
               <div id="registers" class="registers">
               <table id="register_table"></table>
               <table id="flag_table"></table>
            </div>
         </div>
         <div id="devices" class="devices">
            <div id="device_options">
               <a class="device_option" id="bios_loader_opt">BIOS</a>
            </div>
            <div id="bios_loader">
               <input type="input" id="bios_name" value="bios.js">
               <input type="button" value="Load ROM" onclick="load_bios();">
               <p id="message" class="message"></p>
            </div>
         </div>
      </div>

      <script src="aw68k.js"></script>
      <script src="debugger.js"></script>
      <script src="interface.js"></script>

   </body>
</html>
